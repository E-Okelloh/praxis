name: Publish to crates.io

# Trigger: push a version tag, e.g. `git tag v0.2.0 && git push --tags`
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 3

jobs:
  publish:
    name: Publish 13 crates in dependency order
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: crates-io        # requires environment approval in GitHub settings
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.82

      - uses: Swatinem/rust-cache@v2

      - name: Verify workspace builds cleanly before publishing
        run: cargo build --workspace

      - name: Run tests before publishing
        run: cargo test --workspace

      # Publish in strict topological order.
      # Each `cargo publish` waits for the crate to be indexed before returning,
      # so the 30-second sleep is a safety buffer for crates.io propagation.

      - name: Publish e-okelloh-praxis-core
        run: cargo publish -p e-okelloh-praxis-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - run: sleep 30

      - name: Publish e-okelloh-praxis-macros
        run: cargo publish -p e-okelloh-praxis-macros
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - run: sleep 30

      - name: Publish e-okelloh-praxis-gen
        run: cargo publish -p e-okelloh-praxis-gen
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - run: sleep 30

      - name: Publish e-okelloh-praxis-idl
        run: cargo publish -p e-okelloh-praxis-idl
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - run: sleep 30

      - name: Publish e-okelloh-praxis-svm-litesvm
        run: cargo publish -p e-okelloh-praxis-svm-litesvm
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - run: sleep 30

      - name: Publish e-okelloh-praxis-profile
        run: cargo publish -p e-okelloh-praxis-profile
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - run: sleep 30

      - name: Publish e-okelloh-praxis-checks
        run: cargo publish -p e-okelloh-praxis-checks
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - run: sleep 30

      - name: Publish e-okelloh-praxis-fuzz
        run: cargo publish -p e-okelloh-praxis-fuzz
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - run: sleep 30

      - name: Publish e-okelloh-praxis-svm-mollusk
        run: cargo publish -p e-okelloh-praxis-svm-mollusk
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - run: sleep 30

      - name: Publish e-okelloh-praxis-svm-surfpool
        run: cargo publish -p e-okelloh-praxis-svm-surfpool
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - run: sleep 30

      - name: Publish e-okelloh-praxis-report
        run: cargo publish -p e-okelloh-praxis-report
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - run: sleep 30

      - name: Publish e-okelloh-praxis (umbrella)
        run: cargo publish -p e-okelloh-praxis
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - run: sleep 30

      - name: Publish e-okelloh-praxis-cli
        run: cargo publish -p e-okelloh-praxis-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Install

            ```bash
            cargo install e-okelloh-praxis-cli
            ```

            See [CHANGELOG](https://github.com/E-Okelloh/praxis/blob/main/CHANGELOG.md) for details.
