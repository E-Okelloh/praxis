name: Security

on:
  push:
    branches: [main]
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - ".github/workflows/security.yml"
  pull_request:
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
  schedule:
    # Every day at 06:00 UTC — catches new CVEs in existing deps.
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── RustSec advisory database scan ───────────────────────────────────────────
  audit:
    name: CVE Audit (cargo-audit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # ── License + dependency policy check ────────────────────────────────────────
  # cargo-deny enforces: no GPL deps, no duplicate versions of the same crate,
  # and no yanked crates in the dependency tree.
  deny:
    name: Dependency Policy (cargo-deny)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features
